<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NodeWings Nodes</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header id="header"></header>
  <main>
    <section class="card">
      <h2>Nodes</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Node ID</th>
            <th>IP</th>
            <th>Status</th>
            <th>CPU</th>
            <th>RAM</th>
            <th>Last Heartbeat</th>
          </tr>
        </thead>
        <tbody id="nodesBody"></tbody>
      </table>
      <p class="small" id="status"></p>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script>
    function statusTag(status) {
      if (status === "online") {
        return '<span class="tag ok"><span class="icon icon-check" aria-hidden="true"></span>Online</span>';
      }
      return '<span class="tag bad"><span class="icon icon-x" aria-hidden="true"></span>Offline</span>';
    }

    async function renderNodes() {
      const payload = await NodeWings.api("/api/nodes");
      const body = document.getElementById("nodesBody");
      const escape = NodeWings.escapeHtml;
      if (!payload.nodes.length) {
        body.innerHTML = '<tr><td colspan="7" class="small">No nodes configured.</td></tr>';
        return;
      }

      body.innerHTML = payload.nodes
        .map((node) => {
          const cpu = Number(node.resources?.cpuPercent || 0).toFixed(2);
          const ramUsed = Number(node.resources?.ramUsedMb || 0).toFixed(1);
          const ramTotal = Number(node.resources?.ramTotalMb || 0).toFixed(1);
          return `
            <tr>
              <td>${escape(node.name)}</td>
              <td><code>${escape(node.id)}</code></td>
              <td>${escape(node.ip || node.url || "-")}</td>
              <td>${statusTag(node.status)}</td>
              <td>${escape(cpu)}%</td>
              <td>${escape(ramUsed)} / ${escape(ramTotal)} MB</td>
              <td>${escape(node.lastHeartbeat ? new Date(node.lastHeartbeat).toLocaleString() : "-")}</td>
            </tr>
          `;
        })
        .join("");
    }

    (async () => {
      const user = await NodeWings.initPage("Nodes");
      if (!user) return;

      const refresh = async () => {
        try {
          await renderNodes();
          document.getElementById("status").textContent = `Updated ${new Date().toLocaleTimeString()}`;
        } catch (error) {
          document.getElementById("status").textContent = `Error: ${error.message}`;
        }
      };

      await refresh();
      setInterval(refresh, 5000);
    })();
  </script>
</body>
</html>
