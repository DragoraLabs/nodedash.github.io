<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NodeWings Servers</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header id="header"></header>
  <main>
    <section class="card">
      <div class="row" style="justify-content: space-between; align-items: center;">
        <h2>Servers</h2>
        <a href="/servers/create"><button>Create Server</button></a>
      </div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>UUID</th>
            <th>Node</th>
            <th>Runtime</th>
            <th>Status</th>
            <th>RAM</th>
            <th>CPU</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="serversBody"></tbody>
      </table>
      <p class="small" id="status"></p>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script>
    function statusTag(status) {
      if (status === "suspended") {
        return '<span class="tag muted"><span class="icon icon-x" aria-hidden="true"></span>Suspended</span>';
      }
      if (status === "running") {
        return '<span class="tag ok"><span class="icon icon-check" aria-hidden="true"></span>running</span>';
      }
      if (status === "starting" || status === "restarting") {
        return '<span class="tag muted">' + (status || "unknown") + '</span>';
      }
      if (status === "stopped") {
        return '<span class="tag bad"><span class="icon icon-x" aria-hidden="true"></span>stopped</span>';
      }
      return '<span class="tag muted">' + (status || "unknown") + '</span>';
    }

    async function actionServer(uuid, action) {
      await NodeWings.api(`/api/servers/${uuid}/actions/${action}`, { method: "POST" });
      await loadServers();
    }

    function actionButtons(server) {
      const isAdmin = window.currentUser?.role === "admin";
      const suspendLabel = server.suspended ? "Unsuspend" : "Suspend";
      const suspendAction = server.suspended ? "unsuspend" : "suspend";
      const disabledAttr = server.suspended ? "disabled" : "";
      return `
        <div class="row">
          <a href="/servers/${server.uuid}"><button class="secondary">Open</button></a>
          <button ${disabledAttr} onclick="runAction('${server.uuid}','start')">Start</button>
          <button class="secondary" onclick="runAction('${server.uuid}','stop')">Stop</button>
          <button class="secondary" ${disabledAttr} onclick="runAction('${server.uuid}','restart')">Restart</button>
          ${
            isAdmin
              ? `<button class="secondary" onclick="toggleSuspend('${server.uuid}','${suspendAction}')">${suspendLabel}</button>
                 <button class="danger" onclick="deleteServer('${server.uuid}')">Delete</button>`
              : ""
          }
        </div>
      `;
    }

    async function loadServers() {
      const payload = await NodeWings.api("/api/servers");
      const body = document.getElementById("serversBody");
      const escape = NodeWings.escapeHtml;

      if (!payload.servers.length) {
        body.innerHTML = '<tr><td colspan="8" class="small">No servers yet.</td></tr>';
        return;
      }

      body.innerHTML = payload.servers
        .map((server) => `
          <tr>
            <td><a href="/servers/${server.uuid}">${escape(server.name)}</a></td>
            <td><code>${escape(server.uuid)}</code></td>
            <td><code>${escape(server.nodeId)}</code></td>
            <td>${escape(server.runtime)}${server.runtimeVersion ? " " + escape(server.runtimeVersion) : ""}</td>
            <td>${statusTag(server.suspended ? "suspended" : server.status)}</td>
            <td>${escape(server.ramLimitMb)} MB</td>
            <td>${escape(server.cpuLimitPercent)}%</td>
            <td>${actionButtons(server)}</td>
          </tr>
        `)
        .join("");
    }

    window.runAction = async (uuid, action) => {
      const statusEl = document.getElementById("status");
      try {
        statusEl.textContent = `${action} request sent...`;
        await actionServer(uuid, action);
        statusEl.textContent = `${action} completed at ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        statusEl.textContent = `Error: ${error.message}`;
      }
    };

    async function toggleSuspend(uuid, action) {
      const statusEl = document.getElementById("status");
      try {
        await NodeWings.api(`/api/servers/${uuid}`, {
          method: "PATCH",
          body: { suspended: action === "suspend" },
        });
        await loadServers();
        NodeWings.showInfo(statusEl, `Server ${action}ed`);
      } catch (error) {
        NodeWings.showError(statusEl, error.message);
      }
    }

    async function deleteServer(uuid) {
      const statusEl = document.getElementById("status");
      if (!confirm("Delete this server? This cannot be undone.")) return;
      try {
        await NodeWings.api(`/api/servers/${uuid}`, { method: "DELETE" });
        await loadServers();
        NodeWings.showInfo(statusEl, "Server deleted");
      } catch (error) {
        NodeWings.showError(statusEl, error.message);
      }
    }

    window.toggleSuspend = toggleSuspend;
    window.deleteServer = deleteServer;

    (async () => {
      const user = await NodeWings.initPage("Servers");
      if (!user) return;
      window.currentUser = user;

      try {
        await loadServers();
      } catch (error) {
        document.getElementById("status").textContent = error.message;
      }

      setInterval(async () => {
        try {
          await loadServers();
        } catch {}
      }, 5000);
    })();
  </script>
</body>
</html>
